name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # change if your branch is different

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project (Vite)
        run: npm run build

      # 🔥 IMPORTANT: ensure dist exists and contains index.html
      - name: Verify build output
        run: |
          echo "Listing dist folder"
          ls -la dist
          test -f dist/index.html

      # 🔥 Fix SPA routing (React Router, etc.)
      - name: Setup SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # 👈 MUST contain index.html directly

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
